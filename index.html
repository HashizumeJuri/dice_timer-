<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Dice Timer</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #8b5cf6; --accent: #10b981; --bg: #0f172a; --card-bg: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        textarea { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 12px; padding: 12px; font-size: 16px; box-sizing: border-box; resize: none; }
        .display { text-align: center; margin: 20px 0; min-height: 120px; display: flex; flex-direction: column; justify-content: center; }
        #timer-display { font-size: 5rem; font-weight: 800; line-height: 1; margin: 10px 0; font-variant-numeric: tabular-nums; }
        button { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        .roll-btn { background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; }
        .stop-btn { background: #ef4444; color: white; display: none; }
        .log-section { width: 100%; max-width: 400px; margin-top: 20px; }
        .log-item { background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--accent); font-size: 0.85rem; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .rolling { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } }
        input[type="range"] { accent-color: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <textarea id="taskPool" rows="2">筋トレ&#13;読書&#13;勉強</textarea>
    <div style="display:flex; gap:10px; margin: 15px 0;">
        <div style="flex:1; text-align:center;">
            <small>Dice: <span id="numVal">1</span></small>
            <input type="range" id="diceNum" min="1" max="10" value="1" oninput="updateUI()" style="width:100%">
        </div>
        <div style="flex:1; text-align:center;">
            <small>Sides: <span id="sideVal">30</span></small>
            <input type="range" id="diceSides" min="2" max="100" value="30" oninput="updateUI()" style="width:100%">
        </div>
    </div>
    <div class="display">
        <div id="task-display" style="color:var(--accent); font-weight:bold; font-size:1.2rem;">Ready?</div>
        <div id="timer-display">00:00</div>
    </div>
    <button id="rollBtn" class="roll-btn" onclick="roll()">ダイスを振る！</button>
    <button id="stopBtn" class="stop-btn" onclick="reset()">リセット</button>
</div>

<div class="log-section">
    <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; display: flex; justify-content: space-between;">
        <span>SYNCED LOGS</span>
        <span id="syncStatus" style="color: var(--accent);">● Connected</span>
    </div>
    <ul id="logList" style="list-style:none; padding:0;"></ul>
</div>

<script>
    // --- 設定（ここにSupabaseの情報を入れてください） ---
    const SUPABASE_URL = 'https://supabase.com/dashboard/project/ruphulpaluqfacosjbce';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1cGh1bHBhbHVxZmFjb3NqYmNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NjAwMjAsImV4cCI6MjA4OTEzNjAyMH0.tG4ohmgh9xSYR6AODL1W4md8jOihFbcWV6uKkoQpmG4';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let timerId, timeLeft, currentTask, currentFormula;

    function updateUI() {
        document.getElementById('numVal').innerText = document.getElementById('diceNum').value;
        document.getElementById('sideVal').innerText = document.getElementById('diceSides').value;
    }

    function roll() {
        const tasks = document.getElementById('taskPool').value.split('\n').filter(t => t.trim());
        if (!tasks.length) return alert("タスクを入力！");
        
        const n = parseInt(document.getElementById('diceNum').value);
        const s = parseInt(document.getElementById('diceSides').value);
        
        document.getElementById('rollBtn').disabled = true;
        document.getElementById('task-display').classList.add('rolling');
        document.getElementById('timer-display').classList.add('rolling');

        let count = 0;
        const effect = setInterval(() => {
            document.getElementById('task-display').innerText = tasks[Math.floor(Math.random()*tasks.length)];
            document.getElementById('timer-display').innerText = Math.floor(Math.random()*60) + ":00";
            if (++count > 15) {
                clearInterval(effect);
                finalize(tasks, n, s);
            }
        }, 80);
    }

    function finalize(tasks, n, s) {
        document.getElementById('task-display').classList.remove('rolling');
        document.getElementById('timer-display').classList.remove('rolling');
        
        currentTask = tasks[Math.floor(Math.random()*tasks.length)];
        let mins = 0;
        for(let i=0; i<n; i++) mins += Math.floor(Math.random()*s)+1;
        
        currentFormula = `${n}d${s} (${mins}分)`;
        document.getElementById('task-display').innerText = "🎯 " + currentTask;
        timeLeft = mins * 60;
        
        document.getElementById('rollBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        startTimer();
    }

    function startTimer() {
        updateDisplay();
        timerId = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerId);
                completeSession();
            }
        }, 1000);
    }

    function updateDisplay() {
        const m = Math.floor(timeLeft/60);
        const s = timeLeft%60;
        document.getElementById('timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        // ブラウザのタブ名に残り時間を表示
        document.title = `(${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}) Dice Timer`;
    }

    async function completeSession() {
        alert("タイムアップ！お疲れ様でした。");
        await saveToSupabase(currentTask, currentFormula);
        reset();
    }

    async function saveToSupabase(task, formula) {
        try {
            const { error } = await supabase
                .from('logs')
                .insert([{ task, formula }]);
            if (error) throw error;
            loadLogs();
        } catch (e) {
            console.error("Save error:", e);
            alert("同期に失敗しました。");
        }
    }

    async function loadLogs() {
        try {
            const { data, error } = await supabase
                .from('logs')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(10);
            
            if (error) throw error;

            document.getElementById('logList').innerHTML = data.map(log => {
                const date = new Date(log.created_at).toLocaleString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                return `
                    <li class="log-item">
                        <div style="display:flex; justify-content:space-between;">
                            <strong>${log.task}</strong>
                            <small style="color:#94a3b8">${date}</small>
                        </div>
                        <span style="font-size:0.75rem; color:var(--primary)">🎲 ${log.formula}</span>
                    </li>
                `;
            }).join('');
        } catch (e) {
            document.getElementById('syncStatus').innerText = "● Offline";
            document.getElementById('syncStatus').style.color = "#ef4444";
        }
    }

    function reset() {
        clearInterval(timerId);
        document.title = "Sync Dice Timer";
        document.getElementById('rollBtn').style.display = 'block';
        document.getElementById('rollBtn').disabled = false;
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('timer-display').innerText = "00:00";
        document.getElementById('task-display').innerText = "Ready?";
    }

    window.onload = loadLogs;
</script>
</body>
</html>
