<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Dice Timer Pro</title>
    <style>
        :root { --primary: #8b5cf6; --accent: #10b981; --bg: #0f172a; --card-bg: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 24px; width: 100%; max-width: 360px; border: 1px solid #334155; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        textarea { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 12px; padding: 10px; font-size: 16px; box-sizing: border-box; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-size: 0.9rem; color: #94a3b8; }
        input[type="range"] { width: 60%; }
        #timer-display { font-size: 5rem; font-weight: 800; margin: 10px 0; }
        #task-display { color: var(--accent); font-weight: bold; font-size: 1.2rem; min-height: 1.5rem; }
        button { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .roll-btn { background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; }
        .reset-btn { background: #475569; color: white; margin-top: 10px; display: none; }
        .log-item { background: #1e293b; padding: 10px; border-radius: 12px; margin-top: 10px; border-left: 4px solid var(--primary); font-size: 0.8rem; text-align: left; width: 100%; max-width: 360px; box-sizing: border-box; }
        .rolling { animation: shake 0.1s infinite; }
        @keyframes shake { 0%{transform:rotate(1deg)} 50%{transform:rotate(-1deg)} }
    </style>
</head>
<body>

<div class="card">
    <textarea id="taskPool" rows="2">筋トレ&#13;読書&#13;勉強</textarea>
    
    <div class="setting-row">
        <span>個数: <b id="nVal">1</b></span>
        <input type="range" id="diceN" min="1" max="10" value="1" oninput="document.getElementById('nVal').innerText=this.value">
    </div>
    <div class="setting-row">
        <span>面数: <b id="sVal">30</b></span>
        <input type="range" id="diceS" min="2" max="100" value="30" oninput="document.getElementById('sVal').innerText=this.value">
    </div>

    <div id="task-display">Ready?</div>
    <div id="timer-display">00:00</div>
    
    <button id="rollBtn" class="roll-btn" onclick="start()">ダイスを振る</button>
    <button id="resetBtn" class="reset-btn" onclick="location.reload()">リセット</button>
</div>

<div id="logList" style="margin-top:20px; width:100%; max-width:360px;"></div>

<script>
    // --- ここにGASのURLを貼り付けてください ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwlFsHRyEdO8HJqebJaHrzNLkmmZ9kAgPgYv5mg0C8DL2x9R24TVSNvsKi7OOvXa0yn/exec";

    let timeLeft, timerId, audioCtx;

    function start() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        roll();
    }

    function roll() {
        const tasks = document.getElementById('taskPool').value.split('\n').filter(t => t.trim());
        if(!tasks.length) return alert("タスクを入力してください");
        
        document.getElementById('rollBtn').disabled = true;
        document.getElementById('timer-display').classList.add('rolling');

        let count = 0;
        const effect = setInterval(() => {
            document.getElementById('task-display').innerText = tasks[Math.floor(Math.random()*tasks.length)];
            document.getElementById('timer-display').innerText = Math.floor(Math.random()*60) + ":00";
            if(++count > 15) {
                clearInterval(effect);
                document.getElementById('timer-display').classList.remove('rolling');
                finalize(tasks);
            }
        }, 80);
    }

    function finalize(tasks) {
        const n = parseInt(document.getElementById('diceN').value);
        const s = parseInt(document.getElementById('diceS').value);
        const task = tasks[Math.floor(Math.random()*tasks.length)];
        
        let mins = 0;
        for(let i=0; i<n; i++) mins += Math.floor(Math.random()*s)+1;

        document.getElementById('task-display').innerText = "🎯 " + task + " (" + n + "d" + s + ")";
        timeLeft = mins * 60;
        document.getElementById('rollBtn').style.display = 'none';
        document.getElementById('resetBtn').style.display = 'block';
        
        timerId = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft/60), s_rem = timeLeft%60;
            document.getElementById('timer-display').innerText = String(m).padStart(2,'0')+":"+String(s_rem).padStart(2,'0');
            if(timeLeft <= 0) {
                clearInterval(timerId);
                saveLog(task, mins);
                alert("終了！");
            }
        }, 1000);
    }

    async function saveLog(task, mins) {
        // GASに送信（同期）
        await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({task, mins})
        });
        loadLogs();
    }

    async function loadLogs() {
        // GASから取得（同期）
        const res = await fetch(GAS_URL);
        const logs = await res.json();
        document.getElementById('logList').innerHTML = logs.map(l => `
            <div class="log-item"><b>${l.task}</b> (${l.mins})<br><small>${l.date}</small></div>
        `).join('');
    }

    window.onload = loadLogs;
</script>
</body>
</html>
