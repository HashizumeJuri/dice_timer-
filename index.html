<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dice Timer Cloud</title>
    <style>
        :root { --primary: #8b5cf6; --accent: #10b981; --bg: #0f172a; --card-bg: #1e293b; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); color: #f8fafc; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; -webkit-tap-highlight-color: transparent;
        }
        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 24px; 
            width: 100%; max-width: 360px; border: 1px solid #334155; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }
        textarea { 
            width: 100%; background: #0f172a; border: 1px solid #475569; 
            color: white; border-radius: 12px; padding: 12px; font-size: 16px; 
            box-sizing: border-box; margin-bottom: 15px; resize: none;
        }
        #timer-display { font-size: 5.5rem; font-weight: 800; margin: 10px 0; font-variant-numeric: tabular-nums; line-height: 1; }
        #task-display { font-size: 1.4rem; font-weight: bold; color: var(--accent); min-height: 1.8rem; margin-bottom: 5px; }
        button { 
            width: 100%; padding: 20px; border-radius: 18px; border: none; 
            font-weight: bold; font-size: 1.2rem; cursor: pointer; 
            transition: transform 0.1s; touch-action: manipulation;
        }
        .roll-btn { background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; box-shadow: 0 8px 20px rgba(99,102,241,0.3); }
        .roll-btn:active { transform: scale(0.96); }
        .reset-btn { background: #334155; color: #cbd5e1; margin-top: 15px; font-size: 0.9rem; padding: 10px; }
        
        .log-section { width: 100%; max-width: 360px; margin-top: 30px; }
        .log-item { background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--primary); font-size: 0.85rem; }
        
        .rolling { animation: shake 0.1s infinite; color: #94a3b8; }
        @keyframes shake { 0%{transform:rotate(0.5deg)} 50%{transform:rotate(-0.5deg)} }
    </style>
</head>
<body>

<div class="card">
    <textarea id="taskPool" rows="2" placeholder="タスクを改行で入力">筋トレ&#13;読書&#13;プログラミング</textarea>
    
    <div id="task-display">Ready?</div>
    <div id="timer-display">00:00</div>
    
    <button id="rollBtn" class="roll-btn" onclick="bootAudioAndRoll()">運命のダイスを振る</button>
    <button id="resetBtn" class="reset-btn" onclick="resetTimer()" style="display:none;">タイマーを停止・戻す</button>
</div>

<div class="log-section">
    <div style="font-size: 0.8rem; color: #64748b; margin-bottom: 10px; letter-spacing: 0.1em;">HISTORY (LOCAL)</div>
    <div id="logList"></div>
</div>

<script>
    let timeLeft, timerId, audioCtx, currentTask, currentMins;

    // iOS対策：ユーザーのクリックでAudioを起動
    function bootAudioAndRoll() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        roll();
    }

    function playSound(freq, duration) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function roll() {
        const tasks = document.getElementById('taskPool').value.split('\n').filter(t => t.trim());
        if (!tasks.length) return alert("タスクを入力してください");

        const btn = document.getElementById('rollBtn');
        btn.disabled = true;
        document.getElementById('timer-display').classList.add('rolling');

        let count = 0;
        const interval = setInterval(() => {
            playSound(150 + (count * 10), 0.05);
            document.getElementById('task-display').innerText = tasks[Math.floor(Math.random() * tasks.length)];
            document.getElementById('timer-display').innerText = Math.floor(Math.random() * 60) + ":00";
            if (++count > 15) {
                clearInterval(interval);
                finalize(tasks);
            }
        }, 80);
    }

    function finalize(tasks) {
        currentTask = tasks[Math.floor(Math.random() * tasks.length)];
        currentMins = Math.floor(Math.random() * 30) + 1; // 1〜30分
        
        document.getElementById('timer-display').classList.remove('rolling');
        document.getElementById('task-display').innerText = "🎯 " + currentTask;
        
        timeLeft = currentMins * 60;
        document.getElementById('rollBtn').style.display = 'none';
        document.getElementById('resetBtn').style.display = 'block';
        
        startTimer();
    }

    function startTimer() {
        updateDisplay();
        timerId = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerId);
                playSound(880, 0.5); // 終了音
                saveLog(currentTask, currentMins);
                alert("時間終了！: " + currentTask);
                resetTimer();
            }
        }, 1000);
    }

    function updateDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer-display').innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function saveLog(task, mins) {
        const logs = JSON.parse(localStorage.getItem('diceLogs') || '[]');
        logs.unshift({task, mins, date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})});
        localStorage.setItem('diceLogs', JSON.stringify(logs.slice(0, 5)));
        renderLogs();
    }

    function renderLogs() {
        const logs = JSON.parse(localStorage.getItem('diceLogs') || '[]');
        document.getElementById('logList').innerHTML = logs.map(l => `
            <div class="log-item">
                <b>${l.task}</b> <small style="opacity:0.6; float:right;">${l.date}</small><br>
                <span style="color:var(--primary); font-size:0.75rem;">Done: ${l.mins} min</span>
            </div>
        `).join('');
    }

    function resetTimer() {
        clearInterval(timerId);
        document.getElementById('rollBtn').style.display = 'block';
        document.getElementById('rollBtn').disabled = false;
        document.getElementById('resetBtn').style.display = 'none';
        document.getElementById('task-display').innerText = "Ready?";
        document.getElementById('timer-display').innerText = "00:00";
    }

    window.onload = renderLogs;
</script>
</body>
</html>
